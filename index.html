<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>展桌项目排期管理</title>
<style>
:root {
  --bg: #f5f6f8;
  --card: #fff;
  --border: #e5e7eb;
  --text: #1a1a2e;
  --muted: #6b7280;
  --blue: #2563eb;
  --red: #dc2626;
  --amber: #d97706;
  --green: #16a34a;
  --red-bg: #fef2f2;
  --amber-bg: #fffbeb;
  --green-bg: #f0fdf4;
  --blue-bg: #eff6ff;
  --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

/* Header */
header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 18px; font-weight: 700; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-green { background: var(--green-bg); color: var(--green); }
.countdown { margin-left: auto; font-size: 13px; color: var(--muted); }
.countdown strong { color: var(--red); font-size: 16px; }

/* Tabs */
nav { display: flex; gap: 4px; padding: 0 24px; background: var(--card); border-bottom: 1px solid var(--border); }
nav button { padding: 12px 20px; border: none; background: none; font-size: 14px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s; font-family: inherit; }
nav button:hover { color: var(--text); }
nav button.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

/* Main */
main { padding: 24px; max-width: 1300px; margin: 0 auto; }
.panel { display: none; }
.panel.active { display: block; }

/* Filters */
.filters { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.filters select, .filters input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--card); font-family: inherit; }

/* Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; transition: box-shadow .15s; }
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.card-phase { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); font-weight: 600; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.card-meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
.card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 12px; }

/* Table */
.table-wrap { overflow-x: auto; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f8fafc; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafbfc; }

/* Status tags */
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.tag-done { background: var(--green-bg); color: var(--green); }
.tag-progress { background: var(--blue-bg); color: var(--blue); }
.tag-pending { background: var(--amber-bg); color: var(--amber); }
.tag-delay { background: var(--red-bg); color: var(--red); }

.risk-high { background: var(--red-bg); color: var(--red); font-weight: 700; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
.risk-mid { background: var(--amber-bg); color: var(--amber); font-weight: 700; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
.risk-low { background: var(--green-bg); color: var(--green); padding: 2px 6px; border-radius: 4px; font-size: 11px; }

.progress-bar { width: 100%; height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.pg-done { background: var(--green); }
.pg-progress { background: var(--blue); }

select.status-select { padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; background: var(--card); font-family: inherit; cursor: pointer; }

/* Dashboard stats */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
.stat-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.stat-value { font-size: 28px; font-weight: 700; }
.stat-sub { font-size: 12px; color: var(--muted); }

/* Editable */
[contenteditable="true"] { outline: none; border-bottom: 1px dashed transparent; transition: border-color .15s; }
[contenteditable="true"]:hover { border-bottom-color: var(--muted); }
[contenteditable="true"]:focus { border-bottom-color: var(--blue); }

/* Responsive */
@media (max-width: 768px) {
  header { flex-wrap: wrap; }
  .countdown { margin-left: 0; width: 100%; }
  nav { overflow-x: auto; }
  .cards { grid-template-columns: 1fr; }
  .stats { grid-template-columns: repeat(2, 1fr); }
}

.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <h1>📊 展桌项目排期管理</h1>
  <span class="badge badge-red" id="riskBadge">⚠ 高风险</span>
  <span class="countdown">距交付 <strong id="daysLeft">9</strong> 天</span>
</header>

<nav>
  <button class="active" onclick="switchTab('dashboard')">📋 总览</button>
  <button onclick="switchTab('schedule')">📅 排期</button>
  <button onclick="switchTab('todos')">✅ 我的待办</button>
  <button onclick="switchTab('risks')">⚠ 风险</button>
</nav>

<main>

<!-- ═══ 总览 ═══ -->
<section class="panel active" id="panel-dashboard">
  <div class="stats" id="stats"></div>
  <h3 style="margin-bottom:12px;font-size:16px;">各阶段进度</h3>
  <div class="cards" id="phaseCards"></div>
  <div class="table-wrap" style="margin-top:20px;" id="dashboardTable"></div>
</section>

<!-- ═══ 排期 ═══ -->
<section class="panel" id="panel-schedule">
  <div class="filters">
    <select id="projFilter" onchange="renderSchedule()">
      <option value="all">全部项目</option>
    </select>
    <select id="phaseFilter" onchange="renderSchedule()">
      <option value="all">全部阶段</option>
    </select>
  </div>
  <div class="table-wrap" id="scheduleTable"></div>
</section>

<!-- ═══ 待办 ═══ -->
<section class="panel" id="panel-todos">
  <div class="filters">
    <select id="todoPriority" onchange="renderTodos()">
      <option value="all">全部优先级</option>
      <option value="紧急">🔴 紧急</option>
      <option value="重要">🟡 重要</option>
      <option value="普通">🟢 普通</option>
    </select>
  </div>
  <div class="table-wrap" id="todoTable"></div>
</section>

<!-- ═══ 风险 ═══ -->
<section class="panel" id="panel-risks">
  <div class="table-wrap" id="riskTable"></div>
</section>

</main>

<script>
// ═══════════════════ DATA ═══════════════════
const TODAY = new Date(2026, 6, 22); // July 22, 2026
const DEADLINE = new Date(2026, 6, 31); // July 31, 2026

function loadData() {
  const saved = localStorage.getItem('expo_data');
  if (saved) return JSON.parse(saved);
  return {
    tasks: [
      { id:1, project:"日本yodo仙台展桌", phase:"设计阶段", task:"概念设计及内部审核", start:"2026-07-08", end:"2026-07-14", owner:"方镱静", status:"已完成", pct:100, note:"", risk:"" },
      { id:2, project:"日本yodo仙台展桌", phase:"设计阶段", task:"尺寸图纸输出", start:"2026-07-12", end:"2026-07-16", owner:"方镱静", status:"已完成", pct:100, note:"", risk:"" },
      { id:3, project:"日本yodo仙台展桌", phase:"深化阶段", task:"供应商深化施工图纸", start:"2026-07-15", end:"2026-07-19", owner:"兴俊诚", status:"已完成", pct:100, note:"", risk:"" },
      { id:4, project:"日本yodo仙台展桌", phase:"制作阶段", task:"供应商大货制作（含发声喇叭结构）", start:"2026-07-19", end:"2026-07-27", owner:"兴俊诚", status:"进行中", pct:40, note:"首次发声方案，关键风险点", risk:"高" },
      { id:5, project:"日本yodo仙台展桌", phase:"制作阶段", task:"中途验收：检查大货半成品 + 发声喇叭测试", start:"2026-07-26", end:"2026-07-26", owner:"方镱静", status:"待开始", pct:0, note:"提前与供应商约时间", risk:"高" },
      { id:6, project:"日本yodo仙台展桌", phase:"质检阶段", task:"内部质检 + 发声功能专项测试", start:"2026-07-28", end:"2026-07-29", owner:"方镱静", status:"待开始", pct:0, note:"准备测试视频/音频源文件", risk:"高" },
      { id:7, project:"日本yodo仙台展桌", phase:"交付阶段", task:"包装及出库准备（喇叭部位额外加固）", start:"2026-07-29", end:"2026-07-30", owner:"何嘉文", status:"待开始", pct:0, note:"", risk:"中" },
      { id:8, project:"日本yodo仙台展桌", phase:"交付阶段", task:"送货入库 🎯 硬性截止", start:"2026-07-31", end:"2026-07-31", owner:"彭建桥", status:"待开始", pct:0, note:"提前预约车辆 + 确认仓库接收人", risk:"中" },
    ],
    todos: [
      { id:1, task:"联系兴俊诚，要求提交发声喇叭规格书+测试视频", priority:"紧急", due:"2026-07-23", ref:"排期#5", status:"待办", note:"明天截止！" },
      { id:2, task:"跟进供应商今日大货制作进度（要照片/视频）", priority:"紧急", due:"2026-07-22", ref:"排期#4", status:"待办", note:"每日一次" },
      { id:3, task:"准备喇叭备用方案（外置蓝牙音箱选型）", priority:"紧急", due:"2026-07-25", ref:"排期#5", status:"待办", note:"周五前完成" },
      { id:4, task:"安排7/26到供应商处中途验收", priority:"重要", due:"2026-07-26", ref:"排期#5", status:"待办", note:"提前一天约时间" },
      { id:5, task:"收到供应商大货完工通知后确认", priority:"重要", due:"2026-07-27", ref:"排期#4", status:"待办", note:"完工当天确认" },
      { id:6, task:"内部质检 + 发声专项测试", priority:"紧急", due:"2026-07-28", ref:"排期#6", status:"待办", note:"提前准备测试素材" },
      { id:7, task:"确认包装方案 + 物流车辆预约", priority:"重要", due:"2026-07-29", ref:"排期#7/8", status:"待办", note:"喇叭部位加固" },
      { id:8, task:"确认7/31送货入库完成 + 拍照留档", priority:"普通", due:"2026-07-31", ref:"排期#8", status:"待办", note:"硬性截止日" },
    ],
    risks: [
      { id:"R01", level:"高", category:"技术", desc:"发声喇叭首次制作，供应商无内置音箱展桌经验", trigger:"7/26验收喇叭不达标 / 7/28终检不合格", action:"⚡ 7/23前要到喇叭测试视频", solution:"【预防】7/23前要规格书+测试视频，准备外置备用方案；【应急】启用备用方案，与客户沟通", status:"监控中" },
      { id:"R02", level:"高", category:"进度", desc:"只剩9天，大货制作+质检+交付时间紧迫", trigger:"7/27供应商未完工 / 质检后需返工", action:"⚡ 每日跟供应商要进度照片", solution:"【预防】每日跟进进度，7/27硬性完工；【应急】协调加班，评估简化非关键工序", status:"监控中" },
      { id:"R03", level:"中", category:"质量", desc:"单件无备品，损坏/不合格没有替代品", trigger:"质检不合格 / 运输损坏", action:"📦 包装时重点检查喇叭部位", solution:"【预防】包装加固喇叭部位，拍照留档；【应急】确认供应商备料和返工周期", status:"已受控" },
      { id:"R04", level:"中", category:"沟通", desc:"四方协作信息可能遗漏或延迟", trigger:"需求变更未同步 / 供应商理解偏差", action:"✅ 深化图已签字确认", solution:"【预防】钉钉群留痕，关键节点书面确认；【应急】发现偏差立即群内@责任人", status:"已受控" },
      { id:"R05", level:"低", category:"物流", desc:"送货入库环节车辆/仓库接收出问题", trigger:"物流车辆不可用 / 仓库无人接收", action:"📞 7/30确认车辆和仓库", solution:"【预防】7/30前预约车辆，确认仓库信息；【应急】备用物流，协调次日入库", status:"已受控" },
    ]
  };
}

let data = loadData();
function saveData() { localStorage.setItem('expo_data', JSON.stringify(data)); }

// ═══════════════════ HELPERS ═══════════════════
function daysLeft(d) { return Math.ceil((new Date(d) - TODAY) / 86400000); }
function statusTag(s) {
  const map = { '已完成':'tag-done','进行中':'tag-progress','待开始':'tag-pending','已延期':'tag-delay','受阻':'tag-delay','待办':'tag-pending' };
  return `<span class="tag ${map[s]||''}">${s}</span>`;
}
function riskTag(r) {
  if (!r) return '';
  const map = { '高':'risk-high','中':'risk-mid','低':'risk-low' };
  return `<span class="${map[r]||''}">${r}</span>`;
}
function priorityTag(p) {
  const map = { '紧急':'<span class="risk-high">🔴 紧急</span>', '重要':'<span class="risk-mid">🟡 重要</span>', '普通':'<span class="risk-low">🟢 普通</span>' };
  return map[p] || p;
}

function statusSelect(id, current, type) {
  const options = type === 'task' 
    ? ['已完成','进行中','待开始','已延期','受阻']
    : ['已完成','待办','已延期'];
  let html = `<select class="status-select" onchange="updateStatus('${type}',${id},this.value)">`;
  options.forEach(o => {
    html += `<option value="${o}" ${o===current?'selected':''}>${o}</option>`;
  });
  html += '</select>';
  return html;
}

function updateStatus(type, id, value) {
  const list = type === 'task' ? data.tasks : data.todos;
  const item = list.find(x => x.id === id);
  if (item) {
    item.status = value;
    if (type === 'task' && value === '已完成') item.pct = 100;
    if (type === 'task' && value === '进行中' && item.pct === 0) item.pct = 50;
    if (type === 'task' && value === '待开始') item.pct = 0;
    saveData();
    renderAll();
  }
}

// ═══════════════════ RENDER ═══════════════════
function renderAll() {
  const d = daysLeft(DEADLINE);
  document.getElementById('daysLeft').textContent = d;
  const riskBadge = document.getElementById('riskBadge');
  const highRisks = data.risks.filter(r => r.level === '高' && r.status !== '已关闭').length;
  if (highRisks > 0) { riskBadge.className = 'badge badge-red'; riskBadge.textContent = `⚠ ${highRisks}项高风险`; }
  else if (data.risks.some(r => r.level === '中' && r.status !== '已关闭')) { riskBadge.className = 'badge badge-amber'; riskBadge.textContent = '🟡 中等风险'; }
  else { riskBadge.className = 'badge badge-green'; riskBadge.textContent = '🟢 低风险'; }
  
  renderDashboard();
  renderSchedule();
  renderTodos();
  renderRisks();
}

function renderDashboard() {
  // Stats
  const total = data.tasks.length;
  const done = data.tasks.filter(t => t.status === '已完成').length;
  const progress = data.tasks.filter(t => t.status === '进行中').length;
  const pending = data.tasks.filter(t => t.status === '待开始').length;
  const overallPct = Math.round(data.tasks.reduce((s, t) => s + t.pct, 0) / total);
  
  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="stat-label">总任务</div>
      <div class="stat-value">${total}</div>
      <div class="stat-sub">${done} 完成 · ${progress} 进行 · ${pending} 待开始</div>
    </div>
    <div class="stat">
      <div class="stat-label">整体进度</div>
      <div class="stat-value">${overallPct}%</div>
      <div class="progress-bar" style="margin-top:8px;"><div class="progress-fill pg-progress" style="width:${overallPct}%"></div></div>
    </div>
    <div class="stat">
      <div class="stat-label">距交付</div>
      <div class="stat-value" style="color:${daysLeft(DEADLINE)<=3?'var(--red)':'var(--text)'}">${daysLeft(DEADLINE)} 天</div>
      <div class="stat-sub">${DEADLINE.toLocaleDateString('zh-CN')}</div>
    </div>
    <div class="stat">
      <div class="stat-label">风险项</div>
      <div class="stat-value" style="color:var(--red)">${data.risks.filter(r=>r.level==='高'&&r.status!=='已关闭').length}</div>
      <div class="stat-sub">高风险 · ${data.risks.filter(r=>r.status==='监控中').length} 监控中</div>
    </div>
  `;

  // Phase cards
  const phases = ['设计阶段','深化阶段','制作阶段','质检阶段','交付阶段'];
  const phaseIcons = { '设计阶段':'🎨', '深化阶段':'📐', '制作阶段':'🔧', '质检阶段':'🔍', '交付阶段':'📦' };
  let cards = '';
  phases.forEach(ph => {
    const tasks = data.tasks.filter(t => t.phase === ph);
    const pct = tasks.length ? Math.round(tasks.reduce((s,t)=>s+t.pct,0)/tasks.length) : 0;
    const allDone = tasks.every(t => t.status === '已完成');
    const anyProgress = tasks.some(t => t.status === '进行中');
    const status = allDone ? '✅ 已完成' : anyProgress ? '🔄 进行中' : '⏳ 待开始';
    const color = allDone ? 'var(--green)' : anyProgress ? 'var(--blue)' : 'var(--muted)';
    cards += `
      <div class="card">
        <div class="card-header">
          <span class="card-phase">${phaseIcons[ph]||''} ${ph}</span>
          <span style="font-size:13px;color:${color}">${status}</span>
        </div>
        <div class="progress-bar" style="margin:8px 0;"><div class="progress-fill ${allDone?'pg-done':'pg-progress'}" style="width:${pct}%"></div></div>
        <div style="font-size:12px;color:var(--muted);">${pct}% · ${tasks.length}个任务</div>
        ${tasks.map(t => `<div style="font-size:12px;margin-top:4px;display:flex;justify-content:space-between;"><span>${t.task}</span><span style="color:var(--muted)">${t.owner}</span></div>`).join('')}
      </div>`;
  });
  document.getElementById('phaseCards').innerHTML = cards;

  // Quick table
  document.getElementById('dashboardTable').innerHTML = `
    <table>
      <thead><tr><th>阶段</th><th>任务</th><th>截止</th><th>负责人</th><th>状态</th><th>风险</th></tr></thead>
      <tbody>${data.tasks.map(t => `
        <tr>
          <td>${t.phase}</td>
          <td><strong>${t.task}</strong>${t.note?`<br><small style="color:var(--muted)">${t.note}</small>`:''}</td>
          <td>${t.end} (${daysLeft(t.end)}天)</td>
          <td>${t.owner}</td>
          <td>${statusTag(t.status)}</td>
          <td>${riskTag(t.risk)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function renderSchedule() {
  const pf = document.getElementById('projFilter')?.value || 'all';
  const phf = document.getElementById('phaseFilter')?.value || 'all';

  // Populate filters
  const projects = [...new Set(data.tasks.map(t => t.project))];
  const phases = [...new Set(data.tasks.map(t => t.phase))];
  document.getElementById('projFilter').innerHTML = '<option value="all">全部项目</option>' + projects.map(p => `<option value="${p}" ${pf===p?'selected':''}>${p}</option>`).join('');
  document.getElementById('phaseFilter').innerHTML = '<option value="all">全部阶段</option>' + phases.map(p => `<option value="${p}" ${phf===p?'selected':''}>${p}</option>`).join('');

  const filtered = data.tasks.filter(t => 
    (pf === 'all' || t.project === pf) && (phf === 'all' || t.phase === phf)
  );

  document.getElementById('scheduleTable').innerHTML = `
    <table>
      <thead><tr><th>#</th><th>项目</th><th>阶段</th><th>任务</th><th>开始</th><th>截止</th><th>负责人</th><th>状态</th><th>完成%</th><th>备注</th><th>风险</th></tr></thead>
      <tbody>${filtered.map(t => `
        <tr>
          <td>${t.id}</td>
          <td>${t.project}</td>
          <td>${t.phase}</td>
          <td>${t.task}</td>
          <td>${t.start}</td>
          <td>${t.end}</td>
          <td>${t.owner}</td>
          <td>${statusSelect(t.id, t.status, 'task')}</td>
          <td><div class="progress-bar"><div class="progress-fill pg-progress" style="width:${t.pct}%"></div></div><small>${t.pct}%</small></td>
          <td style="font-size:11px;color:var(--muted)">${t.note}</td>
          <td>${riskTag(t.risk)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function renderTodos() {
  const pf = document.getElementById('todoPriority')?.value || 'all';
  const filtered = data.todos.filter(t => pf === 'all' || t.priority === pf);

  document.getElementById('todoTable').innerHTML = `
    <table>
      <thead><tr><th>#</th><th>待办事项</th><th>优先级</th><th>截止</th><th>关联</th><th>状态</th><th>备注</th></tr></thead>
      <tbody>${filtered.map(t => `
        <tr>
          <td>${t.id}</td>
          <td>${t.task}</td>
          <td>${priorityTag(t.priority)}</td>
          <td>${t.due} (${daysLeft(t.due)}天)</td>
          <td style="font-size:11px">${t.ref}</td>
          <td>${statusSelect(t.id, t.status, 'todo')}</td>
          <td style="font-size:11px;color:var(--muted)">${t.note}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function renderRisks() {
  document.getElementById('riskTable').innerHTML = `
    <table>
      <thead><tr><th>ID</th><th>等级</th><th>类别</th><th>风险描述</th><th>触发条件</th><th>应对方案</th><th>关键行动</th><th>状态</th></tr></thead>
      <tbody>${data.risks.map(r => `
        <tr>
          <td>${r.id}</td>
          <td>${riskTag(r.level)}</td>
          <td>${r.category}</td>
          <td>${r.desc}</td>
          <td style="font-size:11px">${r.trigger}</td>
          <td style="font-size:11px;white-space:pre-line">${r.solution}</td>
          <td style="font-size:12px;font-weight:600">${r.action}</td>
          <td>${statusSelect(r.id, r.status, 'risk')}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'schedule') renderSchedule();
  if (name === 'todos') renderTodos();
  if (name === 'risks') renderRisks();
}

function updateStatus(type, id, value) {
  if (type === 'task') {
    const item = data.tasks.find(x => x.id === id);
    if (item) {
      item.status = value;
      if (value === '已完成') item.pct = 100;
      if (value === '进行中' && item.pct < 10) item.pct = 50;
      if (value === '待开始') item.pct = 0;
    }
  } else if (type === 'todo') {
    const item = data.todos.find(x => x.id === id);
    if (item) item.status = value;
  } else if (type === 'risk') {
    const item = data.risks.find(x => x.id === id);
    if (item) item.status = value;
  }
  saveData();
  renderAll();
}

// Init
renderAll();
</script>
</body>
</html>
