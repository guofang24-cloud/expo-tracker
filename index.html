<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>零售空间项目排期管理</title>
<style>
:root {
  --bg: #f5f6f8; --card: #fff; --border: #e5e7eb; --text: #1a1a2e; --muted: #6b7280;
  --blue: #2563eb; --red: #dc2626; --amber: #d97706; --green: #16a34a;
  --red-bg: #fef2f2; --amber-bg: #fffbeb; --green-bg: #f0fdf4; --blue-bg: #eff6ff;
  --purple: #7c3aed; --purple-bg: #f5f3ff; --radius: 10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}

header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
header h1{font-size:18px;font-weight:700}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-green{background:var(--green-bg);color:var(--green)}
.countdown{margin-left:auto;font-size:13px;color:var(--muted)}
.countdown strong{color:var(--red);font-size:16px}

nav{display:flex;gap:4px;padding:0 24px;background:var(--card);border-bottom:1px solid var(--border)}
nav button{padding:12px 20px;border:none;background:none;font-size:14px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;font-family:inherit}
nav button:hover{color:var(--text)}
nav button.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}

main{padding:24px;max-width:1300px;margin:0 auto}
.panel{display:none}
.panel.active{display:block}

.filters{display:flex;gap:12px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.filters select,.filters input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--card);font-family:inherit}

.cat-section{margin-bottom:28px}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.cat-header h2{font-size:17px;font-weight:700}
.cat-icon{font-size:22px}
.cat-badge{font-size:11px;padding:2px 10px;border-radius:12px;font-weight:600}
.cat-zone{background:var(--purple-bg);color:var(--purple)}
.cat-desk{background:var(--blue-bg);color:var(--blue)}

.proj-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.proj-card-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.proj-card-top:hover{background:#fafbfc}
.proj-name{font-size:15px;font-weight:600}
.proj-meta{font-size:12px;color:var(--muted);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.proj-progress{display:flex;align-items:center;gap:8px}
.proj-pct{font-size:14px;font-weight:700}
.proj-table{padding:0 16px 12px}
.proj-table table{width:100%;border-collapse:collapse;font-size:12px}
.proj-table th{background:#f8fafc;padding:8px 10px;text-align:left;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)}
.proj-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.proj-table tr:last-child td{border-bottom:none}
.arrow{transition:transform .2s;font-size:12px;color:var(--muted)}
.arrow.open{transform:rotate(90deg)}
.hidden{display:none}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:4px}
.stat-value{font-size:26px;font-weight:700}
.stat-sub{font-size:11px;color:var(--muted)}

.table-wrap{overflow-x:auto;background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;padding:10px 12px;text-align:left;font-weight:600;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}

.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-done{background:var(--green-bg);color:var(--green)}
.tag-progress{background:var(--blue-bg);color:var(--blue)}
.tag-pending{background:var(--amber-bg);color:var(--amber)}
.tag-delay{background:var(--red-bg);color:var(--red)}

.risk-high{background:var(--red-bg);color:var(--red);font-weight:700;padding:2px 6px;border-radius:4px;font-size:11px}
.risk-mid{background:var(--amber-bg);color:var(--amber);font-weight:700;padding:2px 6px;border-radius:4px;font-size:11px}
.risk-low{background:var(--green-bg);color:var(--green);padding:2px 6px;border-radius:4px;font-size:11px}

.progress-bar{width:100%;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.pg-done{background:var(--green)}
.pg-progress{background:var(--blue)}

select.status-select{padding:2px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;background:var(--card);font-family:inherit;cursor:pointer}

.empty-cat{text-align:center;padding:40px 20px;color:var(--muted);background:var(--card);border-radius:var(--radius);border:1px dashed var(--border)}
.empty-cat .icon{font-size:32px;margin-bottom:8px}

/* ── Chat Assistant ── */
.chat-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.35);z-index:200;transition:all .2s;display:flex;align-items:center;justify-content:center}
.chat-fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(37,99,235,.45)}
.chat-fab.has-unread::after{content:'';position:absolute;top:4px;right:4px;width:10px;height:10px;border-radius:50%;background:var(--red);border:2px solid #fff}

.chat-panel{position:fixed;top:0;right:-420px;width:400px;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:300;transition:right .3s ease;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.08)}
.chat-panel.open{right:0}
.chat-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:299;display:none}
.chat-overlay.show{display:block}

.chat-panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.chat-panel-header h3{font-size:15px;display:flex;align-items:center;gap:8px}
.chat-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:6px}
.chat-close:hover{background:var(--bg)}

.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:88%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.55;word-break:break-word}
.chat-msg.user{align-self:flex-end;background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.chat-msg.assistant{align-self:flex-start;background:#f1f5f9;color:var(--text);border-bottom-left-radius:4px}
.chat-msg.assistant pre{background:#e2e8f0;padding:6px 10px;border-radius:6px;font-size:11px;overflow-x:auto;margin:4px 0}
.chat-msg .update-tag{display:inline-block;background:var(--green-bg);color:var(--green);padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;margin-right:4px}
.chat-typing{align-self:flex-start;padding:10px 14px;background:#f1f5f9;border-radius:14px;font-size:13px;color:var(--muted);display:none}
.chat-typing.active{display:block}

.chat-input-area{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.chat-input-area input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;outline:none;font-family:inherit}
.chat-input-area input:focus{border-color:var(--blue)}
.chat-input-area button{width:38px;height:38px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:16px;cursor:pointer;flex-shrink:0}
.chat-input-area button:disabled{opacity:.5;cursor:not-allowed}

.chat-settings{padding:8px 16px 12px;border-top:1px solid var(--border);flex-shrink:0;display:none}
.chat-settings.show{display:block}
.chat-settings label{font-size:11px;color:var(--muted);display:block;margin-top:6px}
.chat-settings input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;margin-top:2px;font-family:inherit}
.chat-settings small{font-size:10px;color:var(--muted)}
.chat-settings-row{display:flex;gap:8px;align-items:center}
.chat-settings-row a{font-size:11px;color:var(--blue)}

@media(max-width:768px){
  .chat-panel{width:100vw;right:-100vw}
  header{flex-wrap:wrap} .countdown{margin-left:0;width:100%}
  nav{overflow-x:auto} .stats{grid-template-columns:repeat(2,1fr)}
  .proj-card-top{flex-direction:column;align-items:flex-start;gap:8px}
}
</style>
</head>
<body>

<header>
  <h1>📊 零售空间项目排期管理</h1>
  <span class="badge badge-red" id="riskBadge">⚠ 高风险</span>
  <span class="countdown">最近截止 <strong id="daysLeft">9</strong> 天</span>
</header>

<nav>
  <button class="active" onclick="switchTab('dashboard')">📋 总览</button>
  <button onclick="switchTab('schedule')">📅 排期</button>
  <button onclick="switchTab('todos')">✅ 我的待办</button>
  <button onclick="switchTab('risks')">⚠ 风险</button>
</nav>

<main>
<section class="panel active" id="panel-dashboard">
  <div class="stats" id="stats"></div>
  <div id="categorySections"></div>
</section>
<section class="panel" id="panel-schedule">
  <div class="filters">
    <select id="catFilter" onchange="renderSchedule()"><option value="all">全部类别</option><option value="专区">🏢 专区项目</option><option value="展桌">🪑 展桌项目</option></select>
    <select id="projFilter" onchange="renderSchedule()"><option value="all">全部项目</option></select>
    <select id="phaseFilter" onchange="renderSchedule()"><option value="all">全部阶段</option></select>
  </div>
  <div class="table-wrap" id="scheduleTable"></div>
</section>
<section class="panel" id="panel-todos">
  <div class="filters">
    <select id="todoCat" onchange="renderTodos()"><option value="all">全部类别</option></select>
    <select id="todoPriority" onchange="renderTodos()"><option value="all">全部优先级</option><option value="紧急">🔴 紧急</option><option value="重要">🟡 重要</option><option value="普通">🟢 普通</option></select>
  </div>
  <div class="table-wrap" id="todoTable"></div>
</section>
<section class="panel" id="panel-risks">
  <div class="table-wrap" id="riskTable"></div>
</section>
</main>

<!-- Chat FAB -->
<button class="chat-fab" id="chatFab" onclick="toggleChat()" title="AI 项目助手">🤖</button>
<div class="chat-overlay" id="chatOverlay" onclick="toggleChat()"></div>

<!-- Chat Panel -->
<div class="chat-panel" id="chatPanel">
  <div class="chat-panel-header">
    <h3>🤖 项目助手</h3>
    <div style="display:flex;gap:4px">
      <button class="chat-close" onclick="document.getElementById('chatSettings').classList.toggle('show')" title="设置">⚙️</button>
      <button class="chat-close" onclick="toggleChat()">✕</button>
    </div>
  </div>

  <div class="chat-settings" id="chatSettings">
    <small style="color:var(--amber);display:block;margin-bottom:4px">⚠ 需要 API Key 才能使用 AI 对话</small>
    <label>API 地址</label>
    <input id="apiUrl" value="https://api.deepseek.com/v1/chat/completions" placeholder="OpenAI-compatible API URL">
    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="sk-...">
    <label>模型</label>
    <div class="chat-settings-row">
      <input id="apiModel" value="deepseek-chat" placeholder="deepseek-chat" style="flex:1">
      <button class="chat-close" onclick="testConnection()" style="background:var(--green);color:#fff;font-size:11px;padding:6px 10px;border-radius:6px;white-space:nowrap">测试连接</button>
    </div>
    <small style="display:block;margin-top:4px">免费获取 Key：<a href="https://platform.deepseek.com" target="_blank">DeepSeek</a> · <a href="https://openrouter.ai/keys" target="_blank">OpenRouter</a>（有免费模型）</small>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="chat-msg assistant">
      👋 你好！我是你的项目助手。<br><br>
      我可以帮你：<br>
      • 📝 记录和更新项目进度<br>
      • ✅ 管理待办事项<br>
      • ⚠️ 分析和追踪风险<br>
      • 📊 汇报项目状态<br><br>
      <small style="color:var(--muted)">先用右上角 ⚙️ 配置 API Key，然后就可以跟我对话了</small>
    </div>
  </div>

  <div class="chat-typing" id="chatTyping">🤔 思考中...</div>

  <div class="chat-input-area">
    <input id="chatInput" placeholder="输入消息，例如：更新日本yodo的制作进度到60%..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="chatSend" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const TODAY = new Date(2026, 6, 22);

function loadData() {
  const saved = localStorage.getItem('expo_data3');
  if (saved) return JSON.parse(saved);
  return {
    projects: [
      { id:"p1", name:"日本yodo仙台展桌", category:"展桌", deadline:"2026-07-31", team:"设计:方镱静 / 销售:彭建桥 / 采购:何嘉文 / 供应商:兴俊诚", desc:"1pcs 视频展桌" }
    ],
    tasks: [
      { id:1, project:"日本yodo仙台展桌", projectId:"p1", category:"展桌", phase:"设计阶段", task:"概念设计及内部审核", start:"2026-07-08", end:"2026-07-14", owner:"方镱静", status:"已完成", pct:100, note:"", risk:"" },
      { id:2, project:"日本yodo仙台展桌", projectId:"p1", category:"展桌", phase:"设计阶段", task:"尺寸图纸输出", start:"2026-07-12", end:"2026-07-16", owner:"方镱静", status:"已完成", pct:100, note:"", risk:"" },
      { id:3, project:"日本yodo仙台展桌", projectId:"p1", category:"展桌", phase:"深化阶段", task:"供应商深化施工图纸", start:"2026-07-15", end:"2026-07-19", owner:"兴俊诚", status:"已完成", pct:100, note:"", risk:"" },
      { id:4, project:"日本yodo仙台展桌", projectId:"p1", category:"展桌", phase:"制作阶段", task:"供应商大货制作", start:"2026-07-19", end:"2026-07-27", owner:"兴俊诚", status:"进行中", pct:60, note:"", risk:"" },
      { id:5, project:"日本yodo仙台展桌", projectId:"p1", category:"展桌", phase:"制作阶段", task:"中途验收：检查大货半成品", start:"2026-07-26", end:"2026-07-26", owner:"方镱静", status:"待开始", pct:0, note:"提前与供应商约时间", risk:"" },
      { id:6, project:"日本yodo仙台展桌", projectId:"p1", category:"展桌", phase:"质检阶段", task:"内部质检", start:"2026-07-28", end:"2026-07-29", owner:"方镱静", status:"待开始", pct:0, note:"", risk:"" },
      { id:7, project:"日本yodo仙台展桌", projectId:"p1", category:"展桌", phase:"交付阶段", task:"包装及出库准备", start:"2026-07-29", end:"2026-07-30", owner:"何嘉文", status:"待开始", pct:0, note:"", risk:"" },
      { id:8, project:"日本yodo仙台展桌", projectId:"p1", category:"展桌", phase:"交付阶段", task:"送货入库 🎯 硬性截止", start:"2026-07-31", end:"2026-07-31", owner:"彭建桥", status:"待开始", pct:0, note:"提前预约车辆 + 确认仓库接收人", risk:"中" },
    ],
    todos: [
      { id:1, project:"日本yodo仙台展桌", category:"展桌", task:"跟进供应商大货制作进度（要照片/视频）", priority:"紧急", due:"2026-07-22", ref:"排期#4", status:"待办", note:"每日一次" },
      { id:2, project:"日本yodo仙台展桌", category:"展桌", task:"安排7/26到供应商处中途验收", priority:"重要", due:"2026-07-26", ref:"排期#5", status:"待办", note:"提前一天约时间" },
      { id:3, project:"日本yodo仙台展桌", category:"展桌", task:"收到供应商大货完工通知后确认", priority:"重要", due:"2026-07-27", ref:"排期#4", status:"待办", note:"完工当天确认" },
      { id:4, project:"日本yodo仙台展桌", category:"展桌", task:"内部质检", priority:"重要", due:"2026-07-28", ref:"排期#6", status:"待办", note:"" },
      { id:5, project:"日本yodo仙台展桌", category:"展桌", task:"确认包装方案 + 物流车辆预约", priority:"重要", due:"2026-07-29", ref:"排期#7/8", status:"待办", note:"" },
      { id:6, project:"日本yodo仙台展桌", category:"展桌", task:"确认7/31送货入库完成 + 拍照留档", priority:"普通", due:"2026-07-31", ref:"排期#8", status:"待办", note:"硬性截止日" },
    ],
    risks: [
      { id:"R01", project:"日本yodo仙台展桌", category:"展桌", level:"—", type:"技术", desc:"发声喇叭方案已取消，此风险已消除", trigger:"—", action:"—", solution:"—", status:"已关闭" },
      { id:"R02", project:"日本yodo仙台展桌", category:"展桌", level:"中", type:"进度", desc:"距离交付日期紧张，制作+质检+交付需紧凑安排", trigger:"7/27供应商未完工 / 质检后需返工", action:"⚡ 每日跟供应商要进度照片", solution:"【预防】每日跟进进度，7/27硬性完工；【应急】协调加班，评估简化非关键工序", status:"监控中" },
      { id:"R03", project:"日本yodo仙台展桌", category:"展桌", level:"中", type:"质量", desc:"单件无备品，损坏/不合格没有替代品", trigger:"质检不合格 / 运输损坏", action:"📦 包装时重点检查", solution:"【预防】包装加固，拍照留档；【应急】确认供应商备料和返工周期", status:"已受控" },
      { id:"R04", project:"日本yodo仙台展桌", category:"展桌", level:"中", type:"沟通", desc:"四方协作信息可能遗漏或延迟", trigger:"需求变更未同步 / 供应商理解偏差", action:"✅ 深化图已签字确认", solution:"【预防】钉钉群留痕，关键节点书面确认；【应急】发现偏差立即群内@责任人", status:"已受控" },
      { id:"R05", project:"日本yodo仙台展桌", category:"展桌", level:"低", type:"物流", desc:"送货入库环节车辆/仓库接收出问题", trigger:"物流车辆不可用 / 仓库无人接收", action:"📞 7/30确认车辆和仓库", solution:"【预防】7/30前预约车辆，确认仓库信息；【应急】备用物流，协调次日入库", status:"已受控" },
    ]
  };
}

let data = loadData();
function saveData() { localStorage.setItem('expo_data3', JSON.stringify(data)); }

function daysLeft(d) { return Math.ceil((new Date(d) - TODAY) / 86400000); }
function statusTag(s) {
  const m={'已完成':'tag-done','进行中':'tag-progress','待开始':'tag-pending','已延期':'tag-delay','受阻':'tag-delay','待办':'tag-pending'};
  return `<span class="tag ${m[s]||''}">${s}</span>`;
}
function riskTag(r) {
  if(!r)return'';const m={'高':'risk-high','中':'risk-mid','低':'risk-low'};
  return `<span class="${m[r]||''}">${r}</span>`;
}
function priorityTag(p) {
  const m={'紧急':'<span class="risk-high">🔴 紧急</span>','重要':'<span class="risk-mid">🟡 重要</span>','普通':'<span class="risk-low">🟢 普通</span>'};
  return m[p]||p;
}
function statusSelect(id,current,type) {
  const opts=type==='task'?['已完成','进行中','待开始','已延期','受阻']:['已完成','待办','已延期'];
  let h=`<select class="status-select" onchange="updateStatus('${type}',${id},this.value)">`;
  opts.forEach(o=>{h+=`<option value="${o}" ${o===current?'selected':''}>${o}</option>`;});
  return h+'</select>';
}

function updateStatus(type,id,val) {
  if(type==='task'){const it=data.tasks.find(x=>x.id===id);if(it){it.status=val;if(val==='已完成')it.pct=100;if(val==='进行中'&&it.pct<10)it.pct=50;if(val==='待开始')it.pct=0;}}
  else if(type==='todo'){const it=data.todos.find(x=>x.id===id);if(it)it.status=val;}
  else if(type==='risk'){const it=data.risks.find(x=>x.id===id);if(it)it.status=val;}
  saveData();renderAll();
}

function renderAll() {
  const dls=data.projects.map(p=>new Date(p.deadline)).filter(d=>d>=TODAY);
  const near=dls.length?new Date(Math.min(...dls)):TODAY;
  document.getElementById('daysLeft').textContent=daysLeft(near);
  const rb=document.getElementById('riskBadge');
  const hr=data.risks.filter(r=>r.level==='高'&&r.status!=='已关闭').length;
  if(hr>0){rb.className='badge badge-red';rb.textContent=`⚠ ${hr}项高风险`;}
  else if(data.risks.some(r=>r.level==='中'&&r.status!=='已关闭')){rb.className='badge badge-amber';rb.textContent='🟡 中等风险';}
  else{rb.className='badge badge-green';rb.textContent='🟢 低风险';}
  renderDashboard();renderSchedule();renderTodos();renderRisks();
}

function renderDashboard() {
  const total=data.tasks.length,done=data.tasks.filter(t=>t.status==='已完成').length,prog=data.tasks.filter(t=>t.status==='进行中').length,pend=data.tasks.filter(t=>t.status==='待开始').length;
  const opct=total?Math.round(data.tasks.reduce((s,t)=>s+t.pct,0)/total):0;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">全部项目</div><div class="stat-value">${data.projects.length}</div><div class="stat-sub">专区 ${data.projects.filter(p=>p.category==='专区').length} · 展桌 ${data.projects.filter(p=>p.category==='展桌').length}</div></div>
    <div class="stat"><div class="stat-label">总任务</div><div class="stat-value">${total}</div><div class="stat-sub">${done} 完成 · ${prog} 进行 · ${pend} 待开始</div></div>
    <div class="stat"><div class="stat-label">整体进度</div><div class="stat-value">${opct}%</div><div class="progress-bar" style="margin-top:8px"><div class="progress-fill pg-progress" style="width:${opct}%"></div></div></div>
    <div class="stat"><div class="stat-label">高风险</div><div class="stat-value" style="color:var(--red)">${data.risks.filter(r=>r.level==='高'&&r.status!=='已关闭').length}</div><div class="stat-sub">${data.risks.filter(r=>r.status==='监控中').length} 项监控中</div></div>`;

  const cats=[{id:'专区',icon:'🏢',label:'专区项目进度',bc:'cat-zone',em:'暂无专区项目，在排期页添加'},{id:'展桌',icon:'🪑',label:'展桌项目进度',bc:'cat-desk',em:'暂无展桌项目'}];
  let h='';
  cats.forEach(cat=>{
    const projs=data.projects.filter(p=>p.category===cat.id);
    const ctasks=data.tasks.filter(t=>t.category===cat.id);
    const ctodos=data.todos.filter(t=>t.category===cat.id);
    const dtodos=ctodos.filter(t=>t.status==='已完成').length;
    h+=`<div class="cat-section"><div class="cat-header"><span class="cat-icon">${cat.icon}</span><h2>${cat.label}</h2><span class="cat-badge ${cat.bc}">${projs.length} 项目 · ${ctasks.length} 任务 · ${dtodos}/${ctodos.length} 待办</span></div>`;
    if(!projs.length){h+=`<div class="empty-cat"><div class="icon">${cat.icon}</div><div>${cat.em}</div></div>`;}
    else{
      projs.forEach(p=>{
        const tasks=data.tasks.filter(t=>t.projectId===p.id);
        const pct=tasks.length?Math.round(tasks.reduce((s,t)=>s+t.pct,0)/tasks.length):0;
        const dl=daysLeft(p.deadline);const dc=dl<=3?'var(--red)':dl<=7?'var(--amber)':'var(--green)';
        const pr=data.risks.filter(r=>r.project===p.name&&r.level==='高'&&r.status!=='已关闭');
        h+=`<div class="proj-card"><div class="proj-card-top" onclick="this.nextElementSibling.classList.toggle('hidden');this.querySelector('.arrow').classList.toggle('open')"><div><div class="proj-name">${p.name}</div><div class="proj-meta"><span>${p.desc}</span><span>👥 ${p.team}</span><span style="color:${dc};font-weight:600">⏰ ${p.deadline} (${dl}天)</span>${pr.length?`<span class="risk-high">⚠ ${pr.length}项高风险</span>`:''}</div></div><div class="proj-progress"><div style="width:80px"><div class="progress-bar"><div class="progress-fill pg-progress" style="width:${pct}%"></div></div></div><span class="proj-pct">${pct}%</span><span class="arrow">▶</span></div></div><div class="proj-table"><table><thead><tr><th>阶段</th><th>任务</th><th>截止</th><th>负责人</th><th>状态</th><th>风险</th></tr></thead><tbody>${tasks.map(t=>`<tr><td>${t.phase}</td><td><strong>${t.task}</strong>${t.note?`<br><small style="color:var(--muted)">${t.note}</small>`:''}</td><td>${t.end} (${daysLeft(t.end)}天)</td><td>${t.owner}</td><td>${statusSelect(t.id,t.status,'task')}</td><td>${riskTag(t.risk)}</td></tr>`).join('')}</tbody></table></div></div>`;
      });
    }
    h+=`</div>`;
  });
  document.getElementById('categorySections').innerHTML=h;
}

function renderRisks() {
  document.getElementById('riskTable').innerHTML=`<table><thead><tr><th>ID</th><th>项目</th><th>等级</th><th>类别</th><th>描述</th><th>触发条件</th><th>应对</th><th>关键行动</th><th>状态</th></tr></thead><tbody>${data.risks.map(r=>`<tr><td>${r.id}</td><td>${r.project}</td><td>${riskTag(r.level)}</td><td>${r.type}</td><td>${r.desc}</td><td style="font-size:11px">${r.trigger}</td><td style="font-size:11px;white-space:pre-line">${r.solution}</td><td style="font-size:12px;font-weight:600">${r.action}</td><td>${statusSelect(r.id,r.status,'risk')}</td></tr>`).join('')}</tbody></table>`;

function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  event.target.classList.add('active');
  if(name==='schedule')renderSchedule();
  if(name==='todos')renderTodos();
  if(name==='risks')renderRisks();
}

function getSystemPrompt() {
  const projSummary=data.projects.map(p=>{
    const ts=data.tasks.filter(t=>t.projectId===p.id);
    const pct=ts.length?Math.round(ts.reduce((s,t)=>s+t.pct,0)/ts.length):0;
    return `- ${p.name}(${p.category}): 截止${p.deadline}, 进度${pct}%, ${p.desc}`;
  }).join('\n');

  const taskList=data.tasks.map(t=>`  #${t.id} [${t.status} ${t.pct}%] ${t.project}>${t.phase}>${t.task} | 截止:${t.end} | 负责人:${t.owner} | 风险:${t.risk||'无'} | ${t.note||''}`).join('\n');
  const todoList=data.todos.map(t=>`  #${t.id} [${t.status}] ${t.priority} | ${t.task} | 截止:${t.due} | ${t.note||''}`).join('\n');
  const riskList=data.risks.map(r=>`  ${r.id} [${r.level}/${r.status}] ${r.type}: ${r.desc} | 触发:${r.trigger}`).join('\n');

  return `你是零售空间项目排期管理的AI助手，帮助用户管理专区项目和展桌项目。

当前日期: 2026-07-22。计算剩余天数时，days_left = (截止日期 - 2026-07-22)的天数。

=== 项目总览 ===
${projSummary}

=== 全部任务 ===
${taskList}

=== 待办事项 ===
${todoList}

=== 风险登记 ===
${riskList}

=== 数据操作指令 ===
当用户要求更新数据时，你必须严格按照以下格式操作。这是强制执行，不可省略：

1. 先给出文字分析和建议
2. 然后在回复末尾添加一个 \`\`\`json 代码块，每行一条JSON指令

格式示例（必须严格遵守）：
\`\`\`json
{"action":"update_task","id":4,"status":"进行中","pct":60}
{"action":"update_todo","id":1,"status":"已完成"}
\`\`\`

可用操作：
- update_task: id, status(已完成/进行中/待开始/已延期), pct(数字0-100), note(可选字符串)
- update_todo: id, status(已完成/待办/已延期)  
- update_risk: id, status(已触发/监控中/已受控/已关闭)
- add_todo: project, category(专区/展桌), task, priority(紧急/重要/普通), due(YYYY-MM-DD), ref, note
- add_risk: project, category, level(高/中/低), type, desc, trigger, action, solution

关键规则：
1. JSON 必须放在 \`\`\`json 和 \`\`\` 之间，每行一条完整JSON
2. JSON 中不要有注释，不要有换行，严格单行
3. 即使用户只说"更新某某"，你也必须输出JSON指令
4. 完成任务后告诉用户更新了什么
5. 如有即将到期的待办或高风险，主动提醒`;
}

async function testConnection() {
  saveChatConfig();
  const cfg=getChatConfig();
  if(!cfg.key){addChatMessage('assistant','❌ 请先填写 API Key');return;}
  addChatMessage('assistant','⏳ 正在测试连接...');
  try {
    const resp=await fetch(cfg.url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.key}`},body:JSON.stringify({model:cfg.model,messages:[{role:'user',content:'你好，请回复"连接成功"'}],max_tokens:20})});
    if(!resp.ok)throw new Error((await resp.json()).error?.message||`HTTP ${resp.status}`);
    addChatMessage('assistant','✅ 连接成功！现在可以跟我对话了。试试问：\n\n• "汇报当前项目状态"\n• "更新日本yodo制作进度到60%"\n• "明天有什么紧急待办"');
  }catch(e){addChatMessage('assistant','❌ 连接失败：'+e.message);}

loadChatHistory();

function parseAndExecCommands(text) {
  // Extract ```json code blocks
  const blockRe = /```json\s*\n([\s\S]*?)```/g;
  let count = 0, match;
  while ((match = blockRe.exec(text)) !== null) {
    const lines = match[1].split('\n');
    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed || !trimmed.startsWith('{')) continue;
      try {
        const cmd = JSON.parse(trimmed);
        if (cmd.action === 'update_task') {
          const t = data.tasks.find(x => x.id === cmd.id);
          if (t) { if (cmd.status) t.status = cmd.status; if (cmd.pct !== undefined) t.pct = cmd.pct; if (cmd.note !== undefined) t.note = cmd.note; count++; }
        } else if (cmd.action === 'update_todo') {
          const t = data.todos.find(x => x.id === cmd.id);
          if (t) { if (cmd.status) t.status = cmd.status; count++; }
        } else if (cmd.action === 'update_risk') {
          const r = data.risks.find(x => x.id === cmd.id);
          if (r) { if (cmd.status) r.status = cmd.status; count++; }
        } else if (cmd.action === 'add_todo') {
          const newId = Math.max(...data.todos.map(t => t.id), 0) + 1;
          data.todos.push({ id: newId, project: cmd.project, category: cmd.category, task: cmd.task, priority: cmd.priority || '普通', due: cmd.due, ref: cmd.ref || '', status: '待办', note: cmd.note || '' });
          count++;
        } else if (cmd.action === 'add_risk') {
          const newId = 'R' + String(Math.max(...data.risks.map(r => parseInt(r.id.slice(1))), 0) + 1).padStart(2, '0');
          data.risks.push({ id: newId, project: cmd.project, category: cmd.category, level: cmd.level, type: cmd.type, desc: cmd.desc, trigger: cmd.trigger, action: cmd.action, solution: cmd.solution, status: '监控中' });
          count++;
        }
      } catch (e) { console.log('JSON parse error:', trimmed, e); }
    }
  }
  if (count > 0) { saveData(); renderAll(); }
  return count;
}

async function sendMessage() {
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  saveChatConfig();

  addChatMessage('user',text);
  input.value='';

  const cfg=getChatConfig();
  if(!cfg.key){addChatMessage('assistant','⚠️ 请先点击右上角 ⚙️ 配置 API Key。\n\n免费获取：<a href="https://platform.deepseek.com" target="_blank">DeepSeek</a> 或 <a href="https://openrouter.ai/keys" target="_blank">OpenRouter</a>（有免费模型）');return;}

  const typing=document.getElementById('chatTyping');
  typing.classList.add('active');
  document.getElementById('chatSend').disabled=true;

  try {
    const messages=[{role:'system',content:getSystemPrompt()}];
    const hist=document.getElementById('chatMessages').querySelectorAll('.chat-msg');
    hist.forEach(m=>{
      const role=m.classList.contains('user')?'user':'assistant';
      const clean=m.textContent.trim();
      if(clean&&!clean.startsWith('❌')&&!clean.startsWith('✅')&&!clean.startsWith('⏳')){messages.push({role,content:clean});}
    });
    messages.push({role:'user',content:text});

    const controller=new AbortController();const tid=setTimeout(()=>controller.abort(),30000);
    const resp=await fetch(cfg.url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.key}`},body:JSON.stringify({model:cfg.model,messages,temperature:0.7,max_tokens:1200}),signal:controller.signal});
    clearTimeout(tid);
    if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||`HTTP ${resp.status}`);}
    const result=await resp.json();
    let reply=result.choices[0].message.content;

    // Parse commands
    const cmdCount=parseAndExecCommands(reply);
    // Strip JSON code blocks from display (already executed)
    reply = reply.replace(/```json[\s\S]*?```/g, '');
    if (cmdCount > 0) { reply += `\n\n<span class="update-tag">✅ 已更新 ${cmdCount} 项数据</span>`; }

    addChatMessage('assistant',reply);
  }catch(e){
    addChatMessage('assistant','❌ 请求失败：'+e.message+'\n\n请检查 API Key 和网络连接');
  }finally{
    typing.classList.remove('active');
    document.getElementById('chatSend').disabled=false;
    document.getElementById('chatInput').focus();
  }
}
